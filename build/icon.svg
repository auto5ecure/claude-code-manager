<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#5b21b6"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Terminal Window -->
  <rect x="140" y="180" width="744" height="560" rx="40" fill="url(#terminal)"/>

  <!-- Terminal Header Bar -->
  <rect x="140" y="180" width="744" height="60" rx="40" fill="#2a2a2a"/>
  <rect x="140" y="220" width="744" height="20" fill="#2a2a2a"/>

  <!-- Window Buttons -->
  <circle cx="200" cy="210" r="14" fill="#ff5f57"/>
  <circle cx="250" cy="210" r="14" fill="#febc2e"/>
  <circle cx="300" cy="210" r="14" fill="#28c840"/>

  <!-- Terminal Content - Prompt -->
  <text x="180" y="320" font-family="Monaco, monospace" font-size="48" fill="#7c3aed">$</text>
  <text x="230" y="320" font-family="Monaco, monospace" font-size="48" fill="#ffffff">claude</text>

  <!-- Cursor -->
  <rect x="430" y="285" width="24" height="45" fill="#7c3aed">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- MC Badge -->
  <rect x="600" y="580" width="220" height="120" rx="20" fill="rgba(124,58,237,0.9)"/>
  <text x="710" y="660" font-family="SF Pro, Helvetica, Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">MC</text>
</svg>
